<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serena Dashboard</title>
<link rel="icon" type="image/png" sizes="32x32" href="serena-icon-32.png">
<link rel="stylesheet" href="dashboard.css">
<script src="jquery.min.js"></script>
<script src="dashboard.js"></script>
</head>
<body>
<div id="app">
  <header id="topbar">
    <div class="topbar-left">
      <img id="logo" class="theme-aware" src="serena-logo.svg"
           data-light="serena-logo.svg" data-dark="serena-logo-dark-mode.svg" alt="Serena">
      <span id="version-badge"></span>
    </div>
    <div class="topbar-center">
      <nav id="tabs">
        <button class="tab active" data-page="overview">Overview</button>
        <button class="tab" data-page="projects">Projects</button>
        <button class="tab" data-page="sessions">Sessions</button>
        <button class="tab" data-page="logs">Logs</button>
        <button class="tab" data-page="tools">Tools</button>
        <button class="tab" data-page="config">Config</button>
      </nav>
    </div>
    <div class="topbar-right">
      <span id="client-badge" class="badge"></span>
      <button id="theme-btn" title="Toggle theme">🌙</button>
    </div>
  </header>

  <main id="content">
    <!-- Overview -->
    <section id="page-overview" class="page active">
      <div class="stat-row">
        <div class="stat-card" id="stat-projects"><label>Projects</label><span class="stat-val">—</span></div>
        <div class="stat-card" id="stat-sessions"><label>Sessions</label><span class="stat-val">—</span></div>
        <div class="stat-card" id="stat-tools-active"><label>Tools Active</label><span class="stat-val">—</span></div>
        <div class="stat-card" id="stat-tool-calls"><label>Tool Calls</label><span class="stat-val">—</span></div>
        <div class="stat-card" id="stat-memories"><label>Memories</label><span class="stat-val">—</span></div>
      </div>
      <div id="overview-projects"></div>
    </section>

    <!-- Projects -->
    <section id="page-projects" class="page">
      <div class="page-header"><h2>Active Projects</h2></div>
      <div id="projects-grid" class="card-grid"></div>
      <div class="page-header" style="margin-top:2rem"><h2>Registered Projects</h2></div>
      <div id="registered-projects"></div>
    </section>

    <!-- Sessions -->
    <section id="page-sessions" class="page">
      <div class="page-header"><h2>Sessions</h2></div>
      <div id="sessions-list"></div>
    </section>

    <!-- Logs -->
    <section id="page-logs" class="page">
      <div class="page-header">
        <h2>Logs</h2>
        <div class="page-actions">
          <select id="log-level-filter">
            <option value="">All Levels</option>
            <option value="INFO">INFO</option>
            <option value="WARNING">WARNING</option>
            <option value="ERROR">ERROR</option>
            <option value="DEBUG">DEBUG</option>
          </select>
          <input id="log-search" type="text" placeholder="Search logs…">
          <button id="clear-logs-btn" class="btn-sm">Clear</button>
          <button id="scroll-lock-btn" class="btn-sm active" title="Auto-scroll">↓</button>
        </div>
      </div>
      <div id="log-container"><div class="log-placeholder">Waiting for logs…</div></div>
    </section>

    <!-- Tools -->
    <section id="page-tools" class="page">
      <div class="page-header"><h2>Tool Usage</h2></div>
      <div id="tools-stats"></div>
    </section>

    <!-- Config -->
    <section id="page-config" class="page">
      <div class="page-header"><h2>Configuration</h2></div>
      <div id="config-detail"></div>
    </section>
  </main>
</div>
</body>
</html>
